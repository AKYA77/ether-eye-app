version: "3.8"
services:
  ether-eye-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ether-eye-bot:latest
    container_name: ether-eye-bot
    ports:
      - "7860:7860"
    environment:
      PORT: "7860"
      RUST_LOG: "info"
      BIRDEYE_API_KEY: "${BIRDEYE_API_KEY:-}"
      HELIUS_RPC_URL: "${HELIUS_RPC_URL:-https://mainnet.helius-rpc.com}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_KEY: "${SUPABASE_KEY:-}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: on-failure:3
    networks:
      - ether-eye
networks:
  ether-eye:
    driver: bridge
